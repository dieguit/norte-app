services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: norte
      POSTGRES_USER: norte
      POSTGRES_PASSWORD: norte
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U norte -d norte"]
      interval: 5s
      timeout: 5s
      retries: 10

  postgres-test:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: norte_test
      POSTGRES_USER: norte
      POSTGRES_PASSWORD: norte
    ports:
      - "5434:5432"
    volumes:
      - postgres_test_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U norte -d norte_test"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  postgres_test_data:
